name: 🚀 Deploy to VPS Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy John Galt v2.0
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 📦 Deploy to VPS (via HTTPS Git Clone)
      run: |
        echo "🚀 Deploy Job iniciado..."
        echo "📥 Clonando repositório..."
        
        # Clone do repo
        if [ -d "/tmp/john-galt-ci" ]; then
          rm -rf /tmp/john-galt-ci
        fi
        
        git clone https://github.com/KleberMirandaMariano/john-galt-v2.git /tmp/john-galt-ci
        
        echo "✅ Repositório clonado com sucesso!"
        echo ""
        echo "📂 Conteúdo do repositório:"
        ls -la /tmp/john-galt-ci/
        echo ""
        echo "✅ Deploy preparado!"
        echo "   Próximo: Copiar para VPS via SSH (manual ou outro método)"
